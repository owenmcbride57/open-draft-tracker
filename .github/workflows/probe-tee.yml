name: probe-tee
on: workflow_dispatch
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe ESPN core API for tee times
        run: node -e '
          const EID = "401811957";
          const UA = { headers: { "user-agent": "Mozilla/5.0 tee-probe" } };
          const base = `https://sports.core.api.espn.com/v2/sports/golf/leagues/pga/events/${EID}`;
          const get = async (u) => { const r = await fetch(u, UA); return { status: r.status, json: await r.json().catch(() => null) }; };
          const teeHits = (o, url) => { const h = []; (function w(x, p){ if (x && typeof x === "object") for (const k in x){ if (/tee/i.test(k)) h.push(`${url} :: ${p}${k} = ${JSON.stringify(x[k]).slice(0,90)}`); w(x[k], p+k+"."); } })(o, ""); return h; };
          (async () => {
            let hits = [];
            const ev = await get(`${base}?lang=en&region=us`);
            console.log("event:", ev.status, "keys:", ev.json && Object.keys(ev.json));
            if (!ev.json) return;
            hits = hits.concat(teeHits(ev.json, "event"));
            const compRef = ev.json.competitions?.[0]?.$ref || `${base}/competitions/${EID}?lang=en&region=us`;
            const comp = await get(compRef);
            console.log("competition:", comp.status, "keys:", comp.json && Object.keys(comp.json));
            if (comp.json) hits = hits.concat(teeHits(comp.json, "competition"));
            const clRef = comp.json?.competitors?.$ref || `${compRef.split("?")[0]}/competitors?limit=200&lang=en&region=us`;
            const cl = await get(clRef);
            const items = cl.json?.items || [];
            console.log("competitors list:", cl.status, "count:", items.length);
            for (const it of items.slice(0, 3)) {
              const c = await get(it.$ref);
              console.log("competitor:", c.status, "keys:", c.json && Object.keys(c.json));
              if (!c.json) continue;
              hits = hits.concat(teeHits(c.json, "competitor"));
              const sRef = c.json.status?.$ref;
              if (sRef) { const st = await get(sRef); console.log("  status keys:", st.json && Object.keys(st.json)); if (st.json) hits = hits.concat(teeHits(st.json, "status")); }
            }
            console.log("\n===== TEE HITS =====");
            console.log(hits.length ? hits.join("\n") : "(none found)");
          })();
        '
