name: cut-status

# Pulls each drafted golfer's authoritative cut status from ESPN's core API
# (which the static site can't reach directly) and commits cut-status.json for
# the site to read. Mirrors the tee-times workflow.
on:
  schedule:
    - cron: '7/15 * * * *' # every 15 minutes, offset from the tee-times job
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cut-status
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch cut status
        run: node scripts/fetch-cut.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet -- cut-status.json; then
            echo "No change to cut-status.json."
            exit 0
          fi
          git config user.name "cut-status-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cut-status.json
          git commit -m "Update cut status"
          # Land on top of any manual pushes rather than failing the run.
          git pull --rebase --autostash origin main
          git push
